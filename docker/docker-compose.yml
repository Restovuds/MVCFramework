services:
  web:
    build:
      context: .
      dockerfile: php/Dockerfile
    container_name: php84_apache
    ports:
      - "80:80"
    volumes:
      - ../../projects/fr.php8.4/fr_web/:/var/www/html
      - ./apache/vhost.conf:/etc/apache2/sites-available/000-default.conf
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8
    container_name: mysql8_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fr
      MYSQL_USER: user
      MYSQL_PASSWORD: user
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  db_data: